<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gloow Estetic | Reservas Múltiples</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f2a6b7; --dark: #1a1a1a; --bg: #fdfaf8; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; }
        
        /* Estilos del Modal y Wizard */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 15px; overflow: hidden; position: relative; }
        .step { padding: 30px; display: none; }
        .step.active { display: block; }
        
        /* Lista de Servicios con Checkbox */
        .services-list { max-height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .service-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .service-item:last-child { border: none; }
        .service-item input { width: auto; margin-right: 15px; transform: scale(1.2); }
        .service-info { flex: 1; }
        .service-info span { display: block; font-size: 0.8rem; color: #888; }

        /* Time Grid */
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .time-slot { padding: 12px 5px; border: 1px solid var(--primary); border-radius: 6px; text-align: center; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .time-slot.disabled { background: #f0f0f0; border-color: #ddd; color: #ccc; cursor: not-allowed; }
        
        button { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-back { background: none; color: #999; margin-top: 5px; }
    </style>
</head>
<body>

<div style="text-align:center; padding: 50px;">
    <button onclick="openModal()" style="max-width:200px;">Reservar Cita</button>
</div>

<div class="modal-overlay" id="modalCita">
    <div class="modal-content">
        <form id="reservaWizard">
            <div class="step active" id="step1">
                <h3 style="font-family:'Playfair Display'">¿Qué servicios deseas?</h3>
                <input type="text" id="w_nombre" placeholder="Tu nombre completo" required>
                
                <div class="services-list" id="servicesContainer">
                    </div>
                
                <div id="total_summary" style="font-size: 0.85rem; margin-bottom: 10px; color: var(--primary); font-weight: 600;">
                    Total: 0€ | Duración: 0 min
                </div>
                
                <button type="button" onclick="validateStep1()">Siguiente</button>
            </div>

            <div class="step" id="step2">
                <h3>¿Qué día?</h3>
                <input type="date" id="w_fecha" required>
                <button type="button" onclick="checkAvailability()">Ver horas disponibles</button>
                <button type="button" class="btn-back" onclick="goStep(1)">Atrás</button>
            </div>

            <div class="step" id="step3">
                <h3>Horas con tiempo suficiente</h3>
                <p style="font-size:0.7rem; color:#666">Solo mostramos horas donde tenemos tiempo para todos tus servicios.</p>
                <div id="w_time_grid" class="time-grid"></div>
                <input type="hidden" id="w_hora_val">
                <button type="button" class="btn-back" onclick="goStep(2)">Atrás</button>
            </div>

            <div class="step" id="step4">
                <h3>Dirección en Burriana</h3>
                <textarea id="w_notas" rows="3" placeholder="Calle, número, piso..." required></textarea>
                <button type="submit" id="btnFinish">Confirmar Reserva</button>
                <button type="button" class="btn-back" onclick="goStep(3)">Atrás</button>
            </div>
        </form>
    </div>
</div>

<script>
    const _supabase = supabase.createClient("https://sujrgipyxtgwkntjqnse.supabase.co", "sb_publishable_WKAUMKpxnf1T2ZwkuWkD8Q_jx-7lo8D");

    // CONFIGURACIÓN DE SERVICIOS (Duración en minutos)
    const SERVICIOS = [
        { id: 1, nombre: "Manicura Permanente", precio: 12, duracion: 60 },
        { id: 2, nombre: "Manicura + Acrílico", precio: 16, duracion: 90 },
        { id: 3, nombre: "Relieves", precio: 2, duracion: 15 },
        { id: 4, nombre: "Flor 3D", precio: 2, duracion: 15 },
        { id: 5, nombre: "Diseños", precio: 3, duracion: 20 },
        { id: 6, nombre: "Lifting de Pestañas", precio: 25, duracion: 60 },
        { id: 7, nombre: "Depilación Cejas", precio: 8, duracion: 15 },
        { id: 8, nombre: "Depilación Labio", precio: 5, duracion: 10 }
    ];

    // Cargar servicios en el HTML
    const container = document.getElementById('servicesContainer');
    SERVICIOS.forEach(s => {
        container.innerHTML += `
            <div class="service-item" onclick="toggleCheck(${s.id})">
                <input type="checkbox" class="svc-check" value="${s.id}" data-precio="${s.precio}" data-duracion="${s.duracion}" id="svc-${s.id}">
                <div class="service-info">
                    <strong>${s.nombre}</strong>
                    <span>${s.precio}€ - ${s.duracion} min</span>
                </div>
            </div>
        `;
    });

    function toggleCheck(id) {
        const cb = document.getElementById(`svc-${id}`);
        cb.checked = !cb.checked;
        updateSummary();
    }

    function updateSummary() {
        let total = 0;
        let tiempo = 0;
        document.querySelectorAll('.svc-check:checked').forEach(cb => {
            total += parseFloat(cb.dataset.precio);
            tiempo += parseInt(cb.dataset.duracion);
        });
        document.getElementById('total_summary').innerText = `Total: ${total}€ | Duración aprox: ${tiempo} min`;
    }

    function openModal() { document.getElementById('modalCita').style.display = 'flex'; goStep(1); }
    function goStep(n) { 
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
    }

    function validateStep1() {
        if(!document.getElementById('w_nombre').value) return alert("Dinos tu nombre");
        if(document.querySelectorAll('.svc-check:checked').length === 0) return alert("Selecciona al menos un servicio");
        goStep(2);
    }

    async function checkAvailability() {
        const fecha = document.getElementById('w_fecha').value;
        if(!fecha) return alert("Selecciona fecha");

        // Calcular duración total seleccionada
        let duracionTotalRequerida = 0;
        document.querySelectorAll('.svc-check:checked').forEach(cb => duracionTotalRequerida += parseInt(cb.dataset.duracion));

        goStep(3);
        const grid = document.getElementById('w_time_grid');
        grid.innerHTML = "Calculando...";

        // 1. Obtener citas ocupadas de ese día
        const { data: ocupadas } = await _supabase.from('citas').select('hora, nombre').eq('fecha', fecha).order('hora', { ascending: true });
        
        // 2. Definir slots según día (simplificado)
        const diaSemana = new Date(fecha).getDay();
        const slots = (diaSemana === 0 || diaSemana === 6) ? ["10:00", "11:30", "13:00"] : ["10:00", "11:30", "13:00", "14:30", "16:00", "17:30", "19:00"];

        grid.innerHTML = "";

        slots.forEach(h => {
            const horaInicio = timeToMins(h);
            const horaFinPropuesta = horaInicio + duracionTotalRequerida;

            // REGLA: ¿Choca este bloque con alguna cita existente?
            let conflicto = false;
            if(ocupadas) {
                ocupadas.forEach(cita => {
                    const citaInicio = timeToMins(cita.hora);
                    // Suponemos una duración media de 60 min para citas existentes si no se guardó el fin
                    const citaFin = citaInicio + 60; 

                    // Si mi nueva cita empieza antes de que termine otra O termina después de que empiece la siguiente
                    if (horaInicio < citaFin && horaFinPropuesta > citaInicio) {
                        conflicto = true;
                    }
                });
            }

            const d = document.createElement('div');
            d.className = 'time-slot' + (conflicto ? ' disabled' : '');
            d.innerText = h;
            if(!conflicto) {
                d.onclick = () => {
                    document.getElementById('w_hora_val').value = h;
                    goStep(4);
                };
            }
            grid.appendChild(d);
        });
    }

    function timeToMins(time) {
        const [h, m] = time.split(':').map(Number);
        return h * 60 + m;
    }

    document.getElementById('reservaWizard').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnFinish');
        btn.disabled = true;

        const seleccionados = [];
        document.querySelectorAll('.svc-check:checked').forEach(cb => {
            const info = SERVICIOS.find(s => s.id == cb.value);
            seleccionados.push(info.nombre);
        });

        const reserva = {
            nombre: document.getElementById('w_nombre').value,
            fecha: document.getElementById('w_fecha').value,
            hora: document.getElementById('w_hora_val').value,
            notas: `Servicios: ${seleccionados.join(', ')} | Dir: ${document.getElementById('w_notas').value}`
        };

        const { error } = await _supabase.from('citas').insert([reserva]);
        if(!error) {
            alert("¡Reserva confirmada!");
            window.location.href = `https://wa.me/34628302701?text=Reserva: ${reserva.nombre} - ${reserva.fecha} a las ${reserva.hora}. Servicios: ${seleccionados.join(', ')}`;
        } else {
            alert("Error al guardar");
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
